name: Docker Multi-Architecture Build (GHCR)

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "*.txt"
    branches:
      - 'master'
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-jdk:
    uses: ./.github/workflows/fat-build.yml

  build-docker-ghcr:
    needs: build-jdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: piped.jar
      - name: Create Version File
        run: echo $(git log -1 --date=short --pretty=format:%cd)-$(git rev-parse --short HEAD) > VERSION
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
          image: tonistiigi/binfmt:qemu-v7.0.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare repository name and branch tag
        id: prep
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.azul.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ steps.prep.outputs.repo }}:latest
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ steps.prep.outputs.repo }}:${{ steps.prep.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
